<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="bts-api-base" content="">
  <script src="../api-base.js"></script>
  <title>Checkout — BTS WORLD TOUR ARIRANG</title>
  <link href="../content/css/styles.295508835c.css" rel="stylesheet" type="text/css">
  <link rel="icon" sizes="196x196" href="../images/c1ade2d9-b2d1-484a-b163-0e5509e00144-favicon-32x32.png?w=196">
  <style>
    body { font-family: Averta, "Helvetica Neue", Helvetica, Arial, sans-serif; --main-color:#024ddf; }
    .co-wrap { max-width: 560px; margin: 0 auto; padding: 96px 16px 48px; }
    .co-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 24px; }
    .co-card h1 { font-size: 22px; color: #024ddf; margin: 0 0 8px; }
    .co-sum { background: #f6f8fa; padding: 12px 16px; border-radius: 6px; margin: 16px 0; font-size: 15px; }
    label { display: block; font-weight: 600; margin: 12px 0 6px; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
    .co-btn { width: 100%; margin-top: 20px; padding: 14px; background: #024ddf; color: #fff; border: none; border-radius: 4px; font-weight: 600; font-size: 16px; cursor: pointer; }
    .co-btn:disabled { opacity: .6; cursor: not-allowed; }
    .co-pix { text-align: center; margin-top: 24px; display: none; }
    .co-pix img { max-width: 220px; margin: 12px auto; }
    .co-pix textarea { width: 100%; min-height: 88px; font-size: 12px; margin-top: 8px; }
    .co-err { color: #b00020; font-size: 14px; margin-top: 8px; }
    .co-ok { color: #048851; font-weight: 600; margin-top: 16px; }
    nav.navbar { background: #024ddf; border: 0; }
  </style>
</head>
<body>
<header>
  <nav class="navbar navbar-fixed-top" role="navigation">
    <div class="horizontal-container navbar-container">
      <a style="height:100%;display:flex;align-items:center" href="bts-world-tour-arirang.html">
        <img style="height:48px" src="../images/46b77c52-6acd-425b-985f-c036a9dcbf90-ticketmaster.svg?w=300" alt="">
      </a>
      <a href="ingressos.html" id="backIng" style="color:#fff;font-size:14px;">Alterar ingresso</a>
    </div>
  </nav>
</header>

<main class="co-wrap">
  <div class="co-card" id="stepForm">
    <h1>Finalizar pedido</h1>
    <p id="coSub" style="margin:0;color:#555;font-size:14px;"></p>
    <div class="co-sum" id="coSum"></div>

    <form id="coForm">
      <label for="qty">Quantidade de ingressos</label>
      <select id="qty" name="quantity"></select>

      <label for="name">Nome completo</label>
      <input id="name" name="customerName" required autocomplete="name">

      <label for="email">E-mail</label>
      <input id="email" name="customerEmail" type="email" required autocomplete="email">

      <label for="phone">Telefone (WhatsApp)</label>
      <input id="phone" name="customerPhone" autocomplete="tel">

      <label for="doc">CPF</label>
      <input id="doc" name="customerDocument" required inputmode="numeric" placeholder="000.000.000-00">

      <p class="co-err" id="coErr" style="display:none;"></p>
      <button type="submit" class="co-btn" id="coSubmit">Gerar PIX</button>
    </form>

    <div class="co-pix" id="coPix">
      <h2 style="font-size:18px;">Pague com PIX</h2>
      <p style="font-size:14px;color:#555;">Copie o código ou escaneie o QR. A confirmação pode levar alguns instantes.</p>
      <img id="coQrImg" alt="QR Code PIX" />
      <label>Código copia e cola</label>
      <textarea id="coPixCode" readonly></textarea>
      <p class="co-ok" id="coPaid" style="display:none;">Pagamento confirmado! Redirecionando…</p>
      <p style="margin-top:16px;"><a id="coTicketLink" href="#" style="display:none;color:#024ddf;font-weight:600;">Ver meu ingresso</a></p>
    </div>
  </div>
</main>

<script src="track.js"></script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const lote = params.get('lote') || 'vg-28-10';
  const sectorId = params.get('sector') || 'arquib';
  const ticketType = params.get('ticketType') === 'meia' ? 'meia' : 'inteira';

  const sectorNames = { arquib: 'Arquibancada', sup: 'Cadeira Superior', inf: 'Cadeira Inferior', pista: 'Pista' };
  const prices = {
    arquib: { inteira: 680, meia: 340 },
    sup: { inteira: 980, meia: 490 },
    inf: { inteira: 1080, meia: 540 },
    pista: { inteira: 1250, meia: 625 },
  };

  const back = document.getElementById('backIng');
  back.href = 'ingressos.html?lote=' + encodeURIComponent(lote);

  const unit = prices[sectorId] ? prices[sectorId][ticketType] : 680;
  const sub = document.getElementById('coSub');
  sub.textContent = (sectorNames[sectorId] || sectorId) + ' • ' + (ticketType === 'meia' ? 'Meia-entrada' : 'Inteira');

  const qtySel = document.getElementById('qty');
  let maxTickets = 4;

  function refreshSum() {
    const q = parseInt(qtySel.value, 10) || 1;
    const total = unit * q;
    document.getElementById('coSum').innerHTML =
      '<strong>Total</strong>: R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) +
      ' <span style="color:#777">(' + q + ' × R$ ' + unit.toLocaleString('pt-BR') + ',00)</span>';
  }

  function buildQtyOptions(max) {
    qtySel.innerHTML = '';
    for (let i = 1; i <= max; i++) {
      const o = document.createElement('option');
      o.value = String(i);
      o.textContent = String(i);
      qtySel.appendChild(o);
    }
    refreshSum();
  }

  qtySel.addEventListener('change', refreshSum);

  fetch(apiUrl('/api/public-config'))
    .then((r) => r.json())
    .then((c) => {
      maxTickets = c.maxTicketsPerOrder || 4;
      buildQtyOptions(maxTickets);
      if (c.ga4MeasurementId) {
        const s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(c.ga4MeasurementId);
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', c.ga4MeasurementId);
        if (c.googleAdsConversionId) gtag('config', c.googleAdsConversionId);
      }
      window.BtsTracking.pushPageView('checkout');
      const ctx = window.BtsTracking.getContext();
      window.BtsTracking.pushBeginCheckout({
        items: [{ item_id: sectorId, item_name: sub.textContent, price: unit, quantity: 1 }],
        ...ctx,
      });
    })
    .catch(() => buildQtyOptions(4));

  document.getElementById('coForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('coErr');
    err.style.display = 'none';
    const btn = document.getElementById('coSubmit');
    btn.disabled = true;

    const tracking = window.BtsTracking.getContext();
    const body = {
      lote,
      sectorId,
      ticketType,
      quantity: parseInt(qtySel.value, 10) || 1,
      customerName: document.getElementById('name').value.trim(),
      customerEmail: document.getElementById('email').value.trim(),
      customerPhone: document.getElementById('phone').value.trim(),
      customerDocument: document.getElementById('doc').value.trim(),
      tracking,
    };

    try {
      const res = await fetch(apiUrl('/api/checkout/create'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent = data.error || 'Não foi possível gerar o PIX.';
        err.style.display = 'block';
        btn.disabled = false;
        return;
      }

      document.getElementById('stepForm').querySelector('form').style.display = 'none';
      document.getElementById('coPix').style.display = 'block';

      const code = data.pixQrCode || '';
      document.getElementById('coPixCode').value = code;
      const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(code);
      document.getElementById('coQrImg').src = qrUrl;

      const tlink = document.getElementById('coTicketLink');
      tlink.href = 'meu-ingresso.html?token=' + encodeURIComponent(data.publicToken);
      tlink.style.display = 'inline';

      pollPaid(data.publicToken);
    } catch (ex) {
      err.textContent = 'Erro de rede. Tente novamente.';
      err.style.display = 'block';
      btn.disabled = false;
    }
  });

  function pollPaid(token) {
    const tick = async () => {
      try {
        const r = await fetch(apiUrl('/api/order/' + encodeURIComponent(token)));
        const o = await r.json();
        if (o.status === 'paid') {
          document.getElementById('coPaid').style.display = 'block';
          window.BtsTracking.pushPurchase({
            transaction_id: o.fakePurchaseId || o.id,
            value: (o.totalCents || 0) / 100,
            currency: 'BRL',
          });
          setTimeout(() => {
            window.location.href = 'meu-ingresso.html?token=' + encodeURIComponent(token);
          }, 1600);
          return;
        }
      } catch (_) {}
      setTimeout(tick, 4000);
    };
    setTimeout(tick, 3000);
  }
})();
</script>
</body>
</html>
